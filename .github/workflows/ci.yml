name: Release Room quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: release-room-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      RELEASE_ROOM_ACCESS_KEY: release-room-ci-access-key
      RELEASE_ROOM_SESSION_SECRET: release-room-ci-session-secret
      RELEASE_ROOM_WEBHOOK_SECRET: release-room-ci-webhook-secret
      RELEASE_ROOM_ENFORCE_STRONG_SECRETS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Verify standalone workspace
        run: node scripts/verify-workspace.mjs
      - name: Install locked dependencies
        run: npm ci --ignore-scripts 2>&1 | tee install.log
      - name: Lint
        run: npm run lint 2>&1 | tee lint.log
      - name: Strict TypeScript
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Unit and integration tests
        run: npm test 2>&1 | tee test.log
      - name: Production build
        run: npm run build 2>&1 | tee build.log
      - name: Desktop, mobile, and accessibility browser tests
        run: npm run e2e 2>&1 | tee e2e.log
      - name: Production dependency audit
        run: npm run audit:production 2>&1 | tee audit.log
      - name: Upload quality diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: |
            install.log
            lint.log
            typecheck.log
            test.log
            build.log
            e2e.log
            audit.log
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
