name: Release Room quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: release-room-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    env:
      RELEASE_ROOM_ACCESS_KEY: release-room-ci-access-key
      RELEASE_ROOM_SESSION_SECRET: release-room-ci-session-secret
      RELEASE_ROOM_WEBHOOK_SECRET: release-room-ci-webhook-secret
      RELEASE_ROOM_ENFORCE_STRONG_SECRETS: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Verify standalone workspace
        run: node scripts/verify-workspace.mjs
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Commit generated dependency lock
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            echo "package-lock.json is already tracked"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: lock production dependencies"
          git push origin HEAD:${{ github.head_ref }}
      - name: Lint
        run: npm run lint
      - name: Strict TypeScript
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Unit and integration tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Desktop, mobile, and accessibility browser tests
        run: npm run e2e
      - name: Production dependency audit
        run: npm run audit:production
      - name: Upload quality diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: |
            typecheck.log
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
